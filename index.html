<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tech Key Generator</title>
    <!-- Icons ke liye FontAwesome ka link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================
           CSS DESIGN SECTION
           ========================================== */
        
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap');

        /* Default styling aur click box hide */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #050510; /* Dark Black/Blue Tech Background */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Tech Glow Card */
        .card {
            background: rgba(20, 20, 35, 0.6); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.3); 
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15), inset 0 0 15px rgba(99, 102, 241, 0.05);
            text-align: center;
        }

        .header-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Generated Key Box */
        .new-key-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 5px;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); 
        }

        .key-display {
            font-family: 'Space Mono', monospace;
            font-size: 26px;
            letter-spacing: 3px;
            color: #818cf8;
            text-shadow: 0 0 10px rgba(129, 140, 248, 0.6); 
            margin: 15px 0;
            user-select: all; 
        }

        .btn-copy {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); 
        }

        .btn-copy:hover {
            transform: translateY(-3px); 
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.7); 
        }

        .btn-copy:active {
            transform: translateY(0px); 
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        /* History List */
        .history-section { text-align: left; }
        .section-title { font-size: 16px; font-weight: 500; color: #94a3b8; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .keys-list { display: flex; flex-direction: column; gap: 15px; }

        .key-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s;
        }

        .key-item:hover {
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.1);
        }

        .key-item-header { display: flex; justify-content: space-between; align-items: center; }
        .key-text { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: #e2e8f0; display: flex; align-items: center; gap: 8px; }
        .mini-copy { color: #64748b; cursor: pointer; font-size: 15px; transition: color 0.2s; }
        .mini-copy:hover { color: #818cf8; text-shadow: 0 0 5px rgba(129, 140, 248, 0.5); }

        /* Badges */
        .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-unused { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .badge-expired { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }

        .key-item-footer { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #94a3b8; }
        .timer-box { font-family: 'Space Mono', monospace; font-weight: 700; color: #facc15; }
        .timer-box.expired { color: #ef4444; }

        /* Empty State */
        .empty-state { text-align: center; padding: 30px 10px; color: #475569; font-size: 14px; }
        .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; color: #334155; }

        /* General Loader */
        .loader-container { display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 20px 0; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.05); border-radius: 50%; border-top-color: #818cf8; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ==========================================
           FIX 1: Toast Pop-up Fixed (Ab hamesha chupa rahega)
           ========================================== */
        .toast {
            position: fixed;
            bottom: -100px; /* Thoda aur niche kiya */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(5px);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0; /* Jab tak show na ho, gayab rahega */
            visibility: hidden;
        }
        
        .toast.show { 
            bottom: 30px; 
            opacity: 1; /* Show hone par dikhega */
            visibility: visible;
        }

        /* ==========================================
           FEATURE 2: Promotion Box (Developer Box) Design
           ========================================== */
        .promo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 50px; /* Pill Shape */
            padding: 8px 25px;
            text-decoration: none; /* Link ka underline hataya */
            color: #ffffff;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .promo-box:hover {
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.8);
            background: rgba(30, 30, 50, 0.8);
        }

        .promo-box img {
            width: 32px;
            height: 32px;
            border-radius: 50%; /* Image ko gol kiya */
            object-fit: cover;
            border: 2px solid #818cf8; /* Image ke bahar glowing border */
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.5);
        }

        .promo-box span {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Key Generation Card -->
        <div class="card" id="generationCard" style="display: none;">
            <div id="genLoader" class="loader-container">
                <div class="spinner"></div>
                <p style="color: #94a3b8; font-size: 14px;">Generating secure access key...</p>
            </div>
            
            <div id="genResult" class="new-key-box" style="display: none;">
                <div class="header-title" style="margin-bottom: 5px;">
                    <i class="fa-solid fa-bolt" style="color: #fbbf24;"></i> Key Generated!
                </div>
                <p style="color: #94a3b8; font-size: 12px; margin-bottom: 10px;">Valid for the next 24 Hours</p>
                
                <div class="key-display" id="newKeyValue">PH-XXXXXX</div>
                
                <button class="btn-copy" onclick="copyText(document.getElementById('newKeyValue').innerText)">
                    <i class="fa-solid fa-clipboard"></i> Copy to App
                </button>
            </div>
        </div>

        <!-- History Dashboard Card -->
        <div class="card">
            <div class="header-title">
                <i class="fa-solid fa-microchip" style="color: #818cf8;"></i> Live Dashboard
            </div>

            <div class="history-section">
                <div class="section-title">
                    <i class="fa-solid fa-clock-rotate-left"></i> Your Active Keys
                </div>

                <div id="historyLoader" class="loader-container">
                    <div class="spinner"></div>
                </div>

                <div class="keys-list" id="keysContainer" style="display: none;"></div>

                <div class="empty-state" id="emptyState" style="display: none;">
                    <i class="fa-solid fa-box-open"></i>
                    No active keys found.<br>Generate one from the App link.
                </div>
            </div>
        </div>

        <!-- ==========================================
             FEATURE 2: Developer Promotion Link Box
             ========================================== -->
        <!-- Link ko target="_blank" diya hai taaki click karne par Telegram naye tab me khule -->
        <a href="https://t.me/+4hk87cVq1GUyMTNl" target="_blank" class="promo-box">
            <!-- logo.png yahan par set hai, isko HTML file ke sath same folder me upload karna -->
            <img src="logo.png" alt="Developer Logo">
            <span>Developer Prince Hacks</span>
        </a>

    </div>

    <!-- Success Pop-up -->
    <div class="toast" id="toast"><i class="fa-solid fa-check"></i> Key copied to clipboard!</div>


    <!-- ==========================================
         JAVASCRIPT LOGIC SECTION
         ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9hHDcTFh0a-3eSsXJ-sdD4_U78bsagYA",
            authDomain: "prince-hacks-test.firebaseapp.com",
            databaseURL: "https://prince-hacks-test-default-rtdb.firebaseio.com",
            projectId: "prince-hacks-test",
            storageBucket: "prince-hacks-test.firebasestorage.app",
            messagingSenderId: "1070897490445",
            appId: "1:1070897490445:web:17b1cb1461fd76bb888344",
            measurementId: "G-8HF61FHCWN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const isSecretAccess = urlParams.get('secure') === 'true'; 
        
        let userKeysArray = JSON.parse(localStorage.getItem('ph_dashboard_keys')) || [];
        
        // Agar system loading par 5 se jyada key milti hai (Purani save ki hui) 
        // toh unme se extra keys delete kar dega
        if (userKeysArray.length > 5) {
            userKeysArray = userKeysArray.slice(-5);
            localStorage.setItem('ph_dashboard_keys', JSON.stringify(userKeysArray));
        }

        let firebaseDataCache = {};

        function generateShortKey() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let randomPart = '';
            for (let i = 0; i < 6; i++) {
                randomPart += chars[Math.floor(Math.random() * chars.length)];
            }
            return `PH-${randomPart}`; 
        }

        async function initSystem() {
            
            if (isSecretAccess) {
                // Link se secure tag hamesha chupa do
                window.history.replaceState({}, document.title, window.location.pathname);
                document.getElementById('generationCard').style.display = 'block';

                const lastGenTime = localStorage.getItem('ph_last_gen_time');
                const now = new Date().getTime();
                const cooldownTime = 24 * 60 * 60 * 1000; 

                if (lastGenTime && (now - parseInt(lastGenTime)) < cooldownTime) {
                    document.getElementById('genLoader').style.display = 'none';
                    document.getElementById('genResult').style.display = 'block';
                    document.getElementById('genResult').innerHTML = `
                        <div class="header-title" style="margin-bottom: 5px; color: #facc15;"><i class="fa-solid fa-shield"></i> Anti-Spam Active</div>
                        <p style="color: #94a3b8; font-size: 13px; margin-bottom: 10px;">Aap apni daily key pehle hi generate kar chuke hain. Kripya niche Dashboard me dekhein.</p>
                    `;
                } else {
                    await createAndRegisterKey();
                    localStorage.setItem('ph_last_gen_time', now.toString()); 
                }
            }
            
            setupRealtimeSync();
            startCountdownEngine();
        }

        async function createAndRegisterKey() {
            const newKey = generateShortKey(); 
            const keyRef = ref(db, 'ActiveUserKeys/' + newKey);

            try {
                await set(keyRef, {
                    createdAt: serverTimestamp(),
                    durationHours: 24,
                    isUsed: false,
                    boundDeviceId: "NONE"
                });

                if (!userKeysArray.includes(newKey)) {
                    // Nayi key array ke end me daali
                    userKeysArray.push(newKey);
                    
                    // ==========================================
                    // FEATURE 4: LIMIT HISTORY TO 5 KEYS
                    // Agar keys 5 se zyada ho jayein, toh sabse pehli (oldest) delete kar do
                    // ==========================================
                    if (userKeysArray.length > 5) {
                        userKeysArray.shift(); // shift() array se sabse pehla element hata deta hai
                    }
                    
                    // Update LocalStorage
                    localStorage.setItem('ph_dashboard_keys', JSON.stringify(userKeysArray));
                }

                document.getElementById('newKeyValue').innerText = newKey;
                document.getElementById('genLoader').style.display = 'none';
                document.getElementById('genResult').style.display = 'block';

            } catch (err) {
                console.error("Firebase write error:", err);
                document.getElementById('genLoader').innerHTML = '<p style="color:#ef4444;">Server se connect nahi ho paya!</p>';
            }
        }

        function setupRealtimeSync() {
            if (userKeysArray.length === 0) {
                document.getElementById('historyLoader').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            let loadedCount = 0;
            document.getElementById('emptyState').style.display = 'none';

            userKeysArray.forEach(key => {
                const keyRef = ref(db, 'ActiveUserKeys/' + key);
                onValue(keyRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        firebaseDataCache[key] = data; 
                    } else {
                        firebaseDataCache[key] = { expiredOffline: true }; 
                    }

                    loadedCount++;
                    if (loadedCount >= userKeysArray.length) {
                        document.getElementById('historyLoader').style.display = 'none';
                        document.getElementById('keysContainer').style.display = 'flex';
                        renderDashboardUI(); 
                    }
                });
            });
        }

        function renderDashboardUI() {
            const container = document.getElementById('keysContainer');
            container.innerHTML = ''; 

            userKeysArray.slice().reverse().forEach(key => {
                const data = firebaseDataCache[key];
                if (!data) return;

                const itemDiv = document.createElement('div');
                itemDiv.className = 'key-item';
                itemDiv.id = `item-${key}`;

                let badgeClass = 'badge-unused';
                let badgeText = 'Unused';
                
                if (data.expiredOffline) {
                    badgeClass = 'badge-expired';
                    badgeText = 'Expired';
                } else if (data.boundDeviceId && data.boundDeviceId !== 'NONE') {
                    badgeClass = 'badge-active';
                    badgeText = 'Active'; 
                }

                itemDiv.innerHTML = `
                    <div class="key-item-header">
                        <div class="key-text">
                            ${key} 
                            <i class="fa-solid fa-copy mini-copy" onclick="copyText('${key}')"></i>
                        </div>
                        <span class="badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="key-item-footer">
                        <span>Status:</span>
                        <span class="timer-box" id="timer-${key}">Loading...</span>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
        }

        function startCountdownEngine() {
            setInterval(() => {
                if (userKeysArray.length === 0) return;

                userKeysArray.forEach(key => {
                    const data = firebaseDataCache[key];
                    const timerElement = document.getElementById(`timer-${key}`);
                    if (!timerElement || !data) return;

                    if (data.expiredOffline) {
                        timerElement.innerText = "EXPIRED";
                        timerElement.className = "timer-box expired";
                        return;
                    }

                    const now = new Date().getTime();
                    const createdAtTime = data.createdAt;
                    if (!createdAtTime) return;

                    const expiryTime = createdAtTime + (24 * 60 * 60 * 1000); 
                    const distance = expiryTime - now;

                    if (distance < 0) {
                        timerElement.innerText = "EXPIRED";
                        timerElement.className = "timer-box expired";
                        
                        const itemElement = document.getElementById(`item-${key}`);
                        if (itemElement) {
                            const badge = itemElement.querySelector('.badge');
                            if (badge && !badge.classList.contains('badge-expired')) {
                                badge.className = 'badge badge-expired';
                                badge.innerText = 'Expired';
                            }
                        }
                    } else {
                        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                        timerElement.innerText = `${hours.toString().padStart(2, '0')}h ${minutes.toString().padStart(2, '0')}m ${seconds.toString().padStart(2, '0')}s`;
                    }
                });
            }, 1000); 
        }

        window.onload = initSystem;
    </script>

    <!-- Copy Function -->
    <script>
        function copyText(textToCopy) {
            if (textToCopy.includes('XXXX')) return; 
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show'); 
                
                setTimeout(() => { toast.classList.remove('show'); }, 2500);
            }).catch(err => {
                alert("Copy failed: " + err); 
            });
        }
    </script>
</body>
</html>
